name: http_cache_objectbox_store
description: A DB cache store agnostic HTTP client implementation with ObjectBox.
version: 2.1.0
homepage: https://github.com/llfbandit/dart_http_cache/tree/master/http_cache_objectbox_store

resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  http_cache_core: ^1.1.3

  # https://pub.dev/packages/objectbox
  objectbox: ^5.3.2
  flat_buffers: ^25.9.23

dev_dependencies:
  # https://pub.dev/packages/build_runner
  build_runner: ^2.3.3
  # https://pub.dev/packages/objectbox_generator
  objectbox_generator: ^5.3.2
  # https://pub.dev/packages/lints
  lints: ^6.1.0
  # https://pub.dev/packages/test
  test: ^1.24.4

  http_cache_store_tester: ^1.0.0

objectbox:
  # Writes objectbox-model.json and objectbox.g.dart to src/store.
  output_dir: src/store