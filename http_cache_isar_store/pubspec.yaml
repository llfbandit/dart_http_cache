name: http_cache_isar_store
description: A DB cache store agnostic HTTP client implementation with Isar.
version: 3.1.0
repository: https://github.com/llfbandit/dart_http_cache
issue_tracker: https://github.com/llfbandit/dart_http_cache/issues

resolution: workspace

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

dependencies:
  http_cache_core: ^1.1.3

  # Must pin isar_community... package versions because generated code inserts package version.
  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2

dev_dependencies:
  isar_community_generator: 3.3.2
  build_runner: any

  # https://pub.dev/packages/lints
  lints: ^6.1.0
  # https://pub.dev/packages/test
  test: ^1.24.4

  http_cache_store_tester: ^1.0.0
